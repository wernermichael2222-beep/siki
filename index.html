<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Promo Link Runner</title>

  <style>
    :root{
      --card:#ffffff;
      --text:#182033;
      --muted:#6b7280;
      --border:#e5e7eb;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --success:#16a34a;
      --shadow:0 20px 50px rgba(15,23,42,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:linear-gradient(135deg,#eef4ff,#f8fafc);
      color:var(--text);
      min-height:100vh;
    }

    .app{
      width:100%;
      max-width:620px;
      margin:0 auto;
      padding:20px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }

    .top-row{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    button{
      border:0;
      border-radius:13px;
      padding:12px 28px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      background:var(--primary);
      color:white;
      transition:.2s;
      min-height:48px;
    }

    button:hover{
      background:var(--primary-dark);
      transform:translateY(-1px);
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
    }

    .status{
      color:var(--muted);
      font-size:14px;
      font-weight:800;
    }

    .section-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .section-title h2{
      margin:0;
      font-size:18px;
    }

    .badge{
      background:#eff6ff;
      color:#1d4ed8;
      padding:6px 10px;
      border-radius:999px;
      font-size:13px;
      font-weight:900;
      white-space:nowrap;
    }

    .results{
      display:grid;
      gap:10px;
    }

    .empty{
      padding:22px;
      border:1px dashed #cbd5e1;
      border-radius:16px;
      text-align:center;
      color:var(--muted);
      background:#f8fafc;
      font-size:14px;
      font-weight:700;
    }

    .coupon-card{
      width:100%;
      height:68px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 20px;
      border-radius:15px;
      color:white;
      font-size:30px;
      font-weight:950;
      text-decoration:none;
      cursor:pointer;
      transition:.2s;
      box-shadow:0 10px 22px rgba(15,23,42,.12);
      animation:fadeIn .25s ease;
    }

    .coupon-card:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 28px rgba(15,23,42,.18);
    }

    .green{
      background:linear-gradient(135deg,#7ac46c,#5ca84f);
    }

    .blue{
      background:linear-gradient(135deg,#60a5fa,#2563eb);
    }

    .yellow{
      background:linear-gradient(135deg,#fcd34d,#f59e0b);
    }

    .purple{
      background:linear-gradient(135deg,#a78bfa,#7c3aed);
    }

    .amount{
      letter-spacing:-.04em;
    }

    .checkmark{
      display:none;
      width:30px;
      height:30px;
      border-radius:50%;
      background:white;
      color:var(--success);
      align-items:center;
      justify-content:center;
      font-size:17px;
      font-weight:950;
    }

    .coupon-card.clicked .checkmark{
      display:flex;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(8px)}
      to{opacity:1; transform:translateY(0)}
    }

    @media (max-width:680px){
      .app{
        padding:14px;
      }

      button{
        width:100%;
      }

      .top-row{
        align-items:stretch;
      }

      .coupon-card{
        height:64px;
        font-size:28px;
      }
    }
  </style>
</head>

<body>

<div class="app">

  <section class="card">
    <div class="top-row">
      <button id="run">Start</button>
      <span class="status" id="status">Bereit.</span>
    </div>
  </section>

  <section class="card">
    <div class="section-title">
      <h2>Gefundene Links</h2>
      <span class="badge" id="count">0 Links</span>
    </div>

    <div class="results" id="results">
      <div class="empty">Noch keine Links gefunden.</div>
    </div>
  </section>

</div>

<script>
const $ = s => document.querySelector(s);
const sleep = ms => new Promise(r => setTimeout(r, ms));

const SERVER_URL = "https://serverless-api.brame-gamification.com/leads/api/lead/lead-game-data";
const REPEAT_PER_CARD = 4;
const DELAY_SECONDS = 2;

const requests = [
  {
    title: "1 EUR - W24",
    amount: "1 €",
    color: "green",
    body: {
      gameType: "hit-the-target",
      gameData: {
        outcomeId: "5d63265e-f10a-41d8-bab1-cf4de5a3b96b",
        outcomePageId: "page-5d63265e-f10a-41d8-bab1-cf4de5a3b96b"
      },
      sessionId: "44db03fa-4efb-4b8c-86b4-f726272e6902"
    }
  },
  {
    title: "1 EUR - W25",
    amount: "1 €",
    color: "blue",
    body: {
      gameType: "hit-the-target",
      gameData: {
        outcomeId: "3a24aa06-7d1f-490e-bff6-e04c7f5418df",
        outcomePageId: "page-9d83c82a-1991-4a04-9a8a-cd2c7cc6fc77",
        attempts: 10,
        time: 16,
        score: 8
      },
      sessionId: "f6c83b0e-0033-431d-84de-72283681b5b4"
    }
  },
  {
    title: "3 EUR - W24",
    amount: "3 €",
    color: "yellow",
    body: {
      gameType: "hit-the-target",
      gameData: {
        outcomeId: "73c86deb-0a92-4be5-8456-b445d2364cfe",
        outcomePageId: "page-73c86deb-0a92-4be5-8456-b445d2364cfe",
        attempts: 15,
        time: 16,
        score: 9
      },
      sessionId: "44db03fa-4efb-4b8c-86b4-f726272e6902"
    }
  },
  {
    title: "3 EUR - W25",
    amount: "3 €",
    color: "purple",
    body: {
      gameType: "hit-the-target",
      gameData: {
        outcomeId: "c6523890-f7bd-4efd-963f-5b7cce0c6d7d",
        outcomePageId: "page-c6523890-f7bd-4efd-963f-5b7cce0c6d7d",
        attempts: 15,
        time: 16,
        score: 8
      },
      sessionId: "44db03fa-4efb-4b8c-86b4-f726272e6902"
    }
  }
];

const foundLinks = [];

$('#run').onclick = async () => {
  if (!SERVER_URL || SERVER_URL === "SERVER") {
    setStatus("Server-Adresse im Code eintragen.");
    return;
  }

  $('#run').disabled = true;
  clearResults();
  setStatus("Läuft...");

  const headers = {
    "Content-Type": "application/json"
  };

  for (const req of requests) {
    for (let i = 1; i <= REPEAT_PER_CARD; i++) {
      try {
        const res = await fetch(SERVER_URL, {
          method: "PUT",
          headers,
          body: JSON.stringify(req.body)
        });

        if (res.ok) {
          const j = await res.json().catch(() => ({}));
          const link = j?.code?.value?.toString().trim();

          if (link) {
 foundLinks.push({
  title: req.title,
  amount: req.amount,
  color: req.color,
  link: link,
  index: i,
  clicked: false
});

            renderResults();
            setStatus(foundLinks.length + " Links gefunden.");
          }
        }
      } catch (e) {
        setStatus("Fehler bei " + req.title);
      }

      if (i < REPEAT_PER_CARD) {
        await sleep(DELAY_SECONDS * 1000);
      }
    }
  }

  setStatus(foundLinks.length + " Links gefunden.");
  $('#run').disabled = false;
};

function renderResults(){
  $('#results').innerHTML = "";

  if (foundLinks.length === 0) {
    $('#results').innerHTML = '<div class="empty">Noch keine Links gefunden.</div>';
    updateCount(0);
    return;
  }

  foundLinks.forEach((item, position) => {
    addCoupon(item, position);
  });

  updateCount(foundLinks.length);
}

function addCoupon(item, position){
  const card = document.createElement("a");
  card.className = `coupon-card ${item.color}`;
  card.href = item.link;
  card.target = "_blank";
  card.rel = "noopener noreferrer";
  card.title = item.title + " #" + item.index;

  if (item.clicked) {
    card.classList.add("clicked");
  }

  card.innerHTML = `
    <span class="amount">${escapeHtml(item.amount)}</span>
    <span class="checkmark">✓</span>
  `;

  card.addEventListener("click", () => {
    item.clicked = true;
    card.classList.add("clicked");
  });

  $('#results').appendChild(card);
}

function clearResults(){
  foundLinks.length = 0;
  $('#results').innerHTML = '<div class="empty">Noch keine Links gefunden.</div>';
  updateCount(0);
}

function updateCount(count){
  $('#count').textContent = count === 1 ? "1 Link" : count + " Links";
}

function setStatus(text){
  $('#status').textContent = text;
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
</script>

</body>
</html>
